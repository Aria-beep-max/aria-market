# .github/workflows/fetch_prices.yml
# 每個交易日收盤後自動抓取股價

name: 每日股價更新

on:
  schedule:
    - cron: "30 21 * * 1-5"   # UTC 21:30 = 台灣 05:30（隔天早上，確保美股收盤）
    - cron: "0 6 * * 1-5"     # UTC 06:00 = 台灣 14:00（台股收盤後）
  workflow_dispatch:           # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/prices.csv
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
          git push
